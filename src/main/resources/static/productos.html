<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/productos.css">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="brand-title">Sistema de Inventario</h2>
        <nav>
            <a class="active">Productos</a>
            <a href="proveedores.html">Proveedores</a>
            <a href="categorias.html">Categorias</a>
            <a href="ventas.html">Ventas</a>
        </nav>
    </aside>

    <!-- Contenido principal -->
    <div class="main">

        <!-- Topbar -->
        <header class="topbar">
            <h1>PRODUCTOS</h1>
            <a href="home.html" class="home-btn">HOME</a>
        </header>

        <!-- Contenido -->
        <section class="content">

            <!-- Filtros -->
            <div class="filtros">

                <!-- 🔥 BOTÓN MODERNO -->
                <button class="btn-primary" id="cargarProductoBtn">
                    + Nuevo Producto
                </button>

                <div class="campo">
                    <label>NOMBRE</label>
                    <input 
                        type="text" 
                        id="productoNombre" 
                        placeholder="Buscar producto..."
                    >
                </div>

                <div class="campo">
                    <label>PROVEEDOR</label>
                    <input 
                        type="text" 
                        id="proveedorNombre" 
                        placeholder="Buscar proveedor..."
                    >
                </div>

            </div>

            <!-- Total -->
            <p class="total">
                TOTAL PRODUCTOS: <span id="totalCount">0</span>
            </p>

            <!-- 🔥 TABLA CONSISTENTE -->
            <div class="tabla-container">
                <div class="lista" id="lista-productos">

                    <div class="fila encabezado">
                        <span>NOMBRE</span>
                        <span>PROVEEDOR</span>
                        <span>PRECIO</span>
                        <span>STOCK</span>
                        <span>ACCIONES</span>
                    </div>

                    <!-- filas dinámicas -->

                </div>
            </div>

            <div class="paginacion" id="paginacion-productos"></div>

        </section>

    </div>

</div>

<script src="js/productos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
