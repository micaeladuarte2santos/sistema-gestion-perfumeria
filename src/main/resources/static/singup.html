<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../static/css/singup.css">
</head>
<body>

    <div class="login-container">
        
        <div class="login-card">
            <a href="login.html" class="btn-back">← Volver</a>
            <div class="icono">🛒</div>

            <h3>¡Bienvenido!</h3>
            <p class="subtitle">
                Por favor complete los datos para registrarse en el sistema.
            </p>


            <form id="signupForm">

                <div class="input-group">
                    <label for="username">Nombre de usuario:</label>
                    <input type="text" id="username" placeholder="Nombre de usuario" required>
                </div>

                <div class="input-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" placeholder="Nombre" required>
                </div>

                <div class="input-group">
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" placeholder="Apellido" required>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" placeholder="Correo electrónico" required>
                </div>

                <div class="input-group">
                    <label for="fechaNacimiento">Fecha de Nacimiento:</label>
                    <input type="date" id="fechaNacimiento" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>

                <button type="submit" class="btn-logout">REGISTRARSE</button>
             </form>

        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../static/js/singup.js"></script>
</body>
</html>
