<div id="abmOverlayCategoria" class="abm-overlay">
  <div class="abm-panel">

    <!-- Header -->
    <div class="abm-header">
      <h3 id="abmCategoriaTitle">Nueva Categoría</h3>
      <button type="button" class="close" id="btnCerrarCategoria">×</button>
    </div>

    <!-- Formulario -->
    <form id="categoriaForm" class="abm-form">

      <div class="row">
        <label for="nombreCategoria">Nombre de la Categoría</label>
        <input type="text" id="nombreCategoria" name="nombre" required>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-guardar">Guardar</button>
        <button type="button" class="btn btn-cancelar" id="btnCancelarCategoria">Cancelar</button>
      </div>

    </form>

  </div>
</div>
