
<div class="abm-overlay">
  <div class="abm-panel" role="dialog" aria-modal="true" aria-labelledby="abmTitle">
    
    <div class="abm-header">
      <h3 id="abmTitle">Nuevo Producto</h3>
      <button id="btnCerrar" class="close" aria-label="Cerrar">×</button>
    </div>

    <form id="productoForm" class="abm-form" enctype="multipart/form-data">

      
      <div class="row">
        <label for="codigoBarras">Código de barras</label>
        <input id="codigoBarras" name="codigoBarras" type="text" />
      </div>

      
      <div class="row">
        <label for="nombre">Nombre</label>
        <input id="nombre" name="nombre" type="text" required />
      </div>

      
      <div class="row split">
        <div class="col">
          <label for="precio">Precio</label>
          <input id="precio" name="precio" type="number" step="0.01" required />
        </div>

        <div class="col">
          <label for="precioCosto">Precio costo</label>
          <input id="precioCosto" name="precioCosto" type="number" step="0.01" />
        </div>
      </div>

      
      <div class="row split">
        <div class="col">
          <label for="stock">Stock</label>
          <input id="stock" name="stock" type="number" />
        </div>

        <div class="col">
          <label for="imagen">Imagen</label>
          <input type="file" id="imagen" name="imagen" accept=".jpg,.jpeg,.png">
          <div id="contenedorImagen" style="margin-top:10px; display:none;">
            <img id="imagenProducto" style="max-width:150px; border-radius:6px;">
          </div>
        </div>
      </div>

      
      <div class="row split">
        <div class="col">
          <label for="categoria">Categoría</label>
          <select id="categoria" name="categoria" required>
            <option value="">-- Seleccionar --</option>
          </select>
        </div>

        <div class="col">
          <label for="proveedor">Proveedor</label>
          <select id="proveedor" name="proveedor" required>
            <option value="">-- Seleccionar --</option>
          </select>
        </div>
      </div>

      
      <div class="row">
        <label for="activo">Estado</label>
        <div class="checkbox-wrap">
          <input id="activo" name="activo" type="checkbox" checked />
          <label for="activo" class="inline">Activo</label>
        </div>
      </div>

      
      <div class="actions">
        <button type="submit" class="primary">Guardar</button>
        <button type="button" id="btnCancelar">Cancelar</button>
      </div>

    </form>
  </div>
</div>
