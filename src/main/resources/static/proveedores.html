<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proveedores</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/productos.css">
</head>
<body>

<div class="layout">

   
    <aside class="sidebar">
        <h2 class="brand-title">Sistema de Inventario</h2>
        <nav>
            <a href="productos.html">Productos</a>
            <a class="active">Proveedores</a>
            <a href="categorias.html">Categorias</a>
            <a href="ventas.html">Ventas</a>
        </nav>
    </aside>

   
    <div class="main">

        
        <header class="topbar">
            <h1>PROVEEDORES</h1>
            <a href="home.html" class="home-btn">HOME</a>
        </header>

        
        <section class="content">

          
            <div class="filtros">

                
                <button class="btn-primary" id="cargarProveedorBtn">
                    + Nuevo Proveedor
                </button>

                <div class="campo">
                    <label>NOMBRE</label>
                    <input 
                        type="text" 
                        id="proveedorNombre" 
                        placeholder="Buscar proveedor"
                    >
                </div>

                <div class="campo">
                    <label>EMAIL</label>
                    <input 
                        type="text" 
                        id="proveedorEmail" 
                        placeholder="Buscar email"
                    >
                </div>

                <div class="campo">
                    <label>TELÉFONO</label>
                    <input type="text" id="proveedorTelefono" placeholder="Buscar teléfono">
                </div>

            </div>

            
            <p class="total">
                TOTAL PROVEEDORES: <span id="totalCount">0</span>
            </p>

           
            <div class="tabla-container">
                <div class="lista" id="lista-proveedores">

                    <div class="fila encabezado">
                        <span>NOMBRE</span>
                        <span>EMAIL</span>
                        <span>TELÉFONO</span>
                        <span>ACCIONES</span>
                    </div>

                    

                </div>
            </div>

            <div class="paginacion" id="paginacion-proveedores"></div>

        </section>

    </div>

</div>

<script src="js/proveedores.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
