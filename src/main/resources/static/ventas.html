<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ventas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/productos.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <h2 class="brand-title">Sistema de Inventario</h2>
        <nav>
            <a href="productos.html">Productos</a>
            <a href="proveedores.html">Proveedores</a>
            <a href="categorias.html">Categorias</a>
            <a class="active">Ventas</a>
        </nav>
    </aside>

    <div class="main">

        <header class="topbar">
            <h1>VENTAS</h1>
            <a href="home.html" class="home-btn">HOME</a>
        </header>

        <section class="content">

            <div class="filtros">

                <button class="btn-primary" id="cargarVentaBtn">
                    + Nueva Venta
                </button>

                <div class="campo">
                    <label>CLIENTE</label>
                    <input type="text" id="clienteNombre" placeholder="Buscar cliente...">
                </div>

                <div class="campo">
                    <label>ESTADO</label>
                    <input type="text" id="estadoVenta" placeholder="Ej: PENDIENTE">
                </div>

                <div class="campo">
                    <label>MÉTODO DE PAGO</label>
                    <input type="text" id="metodoPagoFiltro" placeholder="Ej: EFECTIVO">
                </div>

            </div>

            <p class="total">TOTAL VENTAS: <span id="totalCount">0</span></p>

            <div class="tabla-container">
                <div class="lista" id="lista-ventas">
                    <div class="fila encabezado">
                        <span>CLIENTE</span>
                        <span>FECHA</span>
                        <span>TOTAL</span>
                        <span>MÉTODO</span>
                        <span>ESTADO</span>
                        <span>TICKET</span>
                        <span>ACCIONES</span>
                    </div>
                </div>
            </div>

            <div class="paginacion" id="paginacion-ventas"></div>

            <div class="resumen-ventas">
                <span>Pendientes: <strong id="contPendientes">0</strong></span>
                <span>Devueltas: <strong id="contDevueltas">0</strong></span>
                <span>Canceladas: <strong id="contCanceladas">0</strong></span>
                <span>Abonadas: <strong id="contAbonadas">0</strong></span>
            </div>

        </section>

    </div>
</div>


<template id="abmVentas">
    <div class="abm-overlay">
        <div class="abm-panel">
            
            <div class="abm-header">
                <h2 id="abmTitle">Nueva Venta</h2>
                <button class="close" id="btnCerrar">×</button>
            </div>

            <form id="ventaForm" class="abm-form">

                <div class="row">
                    <label>Cliente</label>
                    <input type="text" name="nombreCliente" required>
                </div>

                <div class="row">
                    <div class="row-header">
                        <label>Productos</label>

                        <button type="button" id="btnAgregarProducto" class="btn-secondary">
                            + Agregar
                        </button>
                    </div>

                    <div id="detalleProductos">
                        <div class="fila-producto encabezado">
                            <span>Código de barras</span>
                            <span>Producto</span>
                            <span>Cantidad</span>
                            <span>Precio</span>
                            <span>Subtotal</span>
                            <span></span>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <label>Total</label>
                    <input type="number" id="totalVenta" readonly>
                </div>

                <div class="split">
                    <div class="col row">
                        <label>Método de Pago</label>
                        <select name="metodoPago" required>
                            <option value="">Seleccione</option>
                        </select>
                    </div>
                </div>

                <div class="col row" id="estadoContainer">
                    <label>Estado</label>
                    <select name="estado">
                        <option value="">Seleccione</option>
                    </select>
                </div>

                <div class="actions">
                    <button type="button" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>

            </form>

        </div>
    </div>
</template>


<div id="printArea" style="display: none;"></div>


<script src="js/ventas.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
