<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Categorías</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/productos.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>Sistema de<br>Inventario</h2>

        <nav>
            <a href="productos.html">Productos</a>
            <a href="proveedores.html">Proveedores</a>
            <a class="active">Categorías</a>
            <a href="ventas.html">Ventas</a>
        </nav>
    </aside>


    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <header class="topbar">
            <h1>CATEGORÍAS</h1>
            <a href="home.html" class="home-btn">HOME</a>
        </header>


        <!-- CONTENIDO -->
        <section class="content">

            <!-- FILTROS -->
            <div class="filtros">

                <button class="btn" id="cargarCategoriaBtn">
                    CARGAR<br>CATEGORÍA
                </button>

                <div class="campo">
                    <label>NOMBRE</label>
                    <input type="text" id="categoriaNombre" placeholder="Buscar categoría">
                </div>

            </div>

            <!-- TOTAL -->
            <p class="total">
                TOTAL CATEGORÍAS: <span id="totalCount">0</span>
            </p>

            <!-- TABLA -->
            <div class="tabla-container">
                <div class="lista" id="lista-categorias">

                    <div class="fila encabezado">
                        <span>NOMBRE</span>
                        <span>ACCIONES</span>
                    </div>

                </div>
            </div>

        </section>

    </div>

</div>

<script src="js/categorias.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
